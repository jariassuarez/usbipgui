<div class="flex flex-wrap items-center gap-4">

  {% if error %}
  <div class="w-full bg-red-900/40 border border-red-700 text-red-300 rounded px-3 py-2 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <div class="flex items-center gap-2 text-sm">
    <span class="text-slate-400">vhci-hcd:</span>
    {% if module_loaded %}
      <span class="bg-green-900/50 text-green-400 border border-green-700 px-2 py-0.5 rounded text-xs font-medium">loaded</span>
    {% else %}
      <span class="bg-slate-700 text-slate-400 border border-slate-600 px-2 py-0.5 rounded text-xs font-medium">not loaded</span>
    {% endif %}
  </div>

  {% if not module_loaded %}
  <button class="ml-auto text-sm bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded transition-colors"
          hx-post="/client/module/load"
          hx-target="#vhci-status"
          hx-swap="innerHTML">
    Load Module
  </button>
  {% endif %}

</div>
